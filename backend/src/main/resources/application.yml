spring:
  application:
    name: docvalidator

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  datasource:
    url: jdbc:h2:mem:docvalidator
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  servlet:
    context-path: /

# DocValidator Configuration
docvalidator:
  # Target API Configuration
  target-api:
    name: Spotify Web API
    base-url: https://api.spotify.com/v1
    openapi-spec-url: https://developer.spotify.com/documentation/web-api
    timeout: 30000
    max-retries: 3
  
  # Authentication Configuration
  authentication:
    type: oauth2
    spotify:
      client-id: ${SPOTIFY_CLIENT_ID:your_client_id}
      client-secret: ${SPOTIFY_CLIENT_SECRET:your_client_secret}
      token-url: https://accounts.spotify.com/api/token
      scopes:
        - user-read-private
        - user-read-email
        - playlist-read-private
        - playlist-modify-public
        - playlist-modify-private
  
  # AI Configuration
  ai:
    provider: ${AI_PROVIDER:openrouter}  # openai, openrouter, or claude
    openai:
      api-key: ${OPENAI_API_KEY:your_openai_key}
      model: gpt-4
      temperature: 0.2
      max-tokens: 2000
    openrouter:
      api-key: ${OPENROUTER_API_KEY:your_openrouter_key}
      base-url: https://openrouter.ai/api/v1
      model: ${OPENROUTER_MODEL:openai/gpt-4}  # or anthropic/claude-3-opus, google/gemini-pro, etc.
      temperature: 0.2
      max-tokens: 2000
      site-url: ${OPENROUTER_SITE_URL:http://localhost:8080}  # Optional: for rankings
      app-name: ${OPENROUTER_APP_NAME:DocValidator}  # Optional: for rankings
    claude:
      api-key: ${CLAUDE_API_KEY:your_claude_key}
      model: claude-3-opus-20240229
      temperature: 0.2
      max-tokens: 2000
  
  # Test Generation Configuration
  test-generation:
    enabled: true
    generate-edge-cases: true
    generate-negative-tests: true
    generate-workflow-tests: true
    max-tests-per-endpoint: 10
  
  # Validation Configuration
  validation:
    strict-mode: false
    semantic-analysis: true
    schema-validation: true
    response-time-threshold: 5000
    fail-on-discrepancy: false
  
  # MCP Configuration
  mcp:
    enabled: true
    doc-server:
      enabled: true
      port: 8081
    api-server:
      enabled: true
      port: 8082
  
  # Reporting Configuration
  reporting:
    output-dir: target/reports
    formats:
      - html
      - json
      - markdown
    include-recommendations: true
    severity-levels:
      - critical
      - high
      - medium
      - low

# Logging Configuration
logging:
  level:
    root: INFO
    com.docvalidator: DEBUG
    org.springframework.web: INFO
    io.swagger: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/docvalidator.log
    max-size: 10MB
    max-history: 30

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

